{% extends 'base.html' %}

{% block content %}

<h2>Schedule Session</h2>

<hr>

<p><strong>Skill:</strong> {{ req.skill.name }}</p>
<p><strong>Student:</strong> {{ req.sender.username }}</p>

<form method="POST">
    {% csrf_token %}

    <label>Select Date:</label><br>
<input type="date" name="date" required><br><br>

<label>Select Time:</label><br>
<input type="time" name="time" required><br><br>

<label>Meeting Link:</label><br>
<input type="text" name="link" required><br><br>

<button class="btn">Confirm Schedule</button>
</form>

{% endblock %}
